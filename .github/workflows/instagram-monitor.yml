name: Instagram Monitor

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar credentials.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Restaurar sessão do Instagram
        env:
          INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION }}
        run: python -c "import base64,os; s=os.environ['INSTAGRAM_SESSION'].strip().replace('\n','').replace('\r',''); open('session-accountverificarseguidor','wb').write(base64.b64decode(s))"

      - name: Rodar monitor
        run: python main.py
