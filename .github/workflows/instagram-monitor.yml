name: Instagram Monitor

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar credentials.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Restaurar sessão do Instagram
        env:
          INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION }}
        run: python -c "import base64,os; s=os.environ['INSTAGRAM_SESSION'].strip().replace('\n','').replace('\r',''); open('session-accountverificarseguidor','wb').write(base64.b64decode(s))"

      - name: Instalar e iniciar Tor
        run: |
          sudo apt-get install -y tor
          printf '\nControlPort 9051\nCookieAuthentication 1\nCookieAuthFileGroupReadable 1\n' | sudo tee -a /etc/tor/torrc
          sudo service tor restart
          sleep 20
          sudo chmod 644 /run/tor/control.authcookie 2>/dev/null \
            || sudo chmod 644 /var/run/tor/control.authcookie 2>/dev/null || true
          ls -la /run/tor/ 2>/dev/null || ls -la /var/run/tor/ 2>/dev/null || echo "dir nao encontrado"
          echo "IP via Tor:"
          curl --silent --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || echo "Tor ativo"
          ss -tlnp | grep 9051 && echo "ControlPort OK" || echo "AVISO: ControlPort nao ouvindo"

      - name: Rodar monitor
        env:
          USE_TOR: "true"
        run: python main.py
