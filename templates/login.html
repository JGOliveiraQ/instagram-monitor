<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCBS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --card:     #111111;
      --border:   rgba(255,255,255,0.08);
      --p1:       #8b5cf6;
      --p2:       #6366f1;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --error-bg: rgba(239,68,68,0.1);
      --error-bd: rgba(239,68,68,0.35);
      --error-tx: #fca5a5;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .b1 { width: 520px; height: 520px; background: rgba(139,92,246,0.1); top: -180px; left: -120px; }
    .b2 { width: 420px; height: 420px; background: rgba(99,102,241,0.07); bottom: -120px; right: -100px; animation-delay: -6s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,25px) scale(1.05); }
    }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; padding: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }
    .brand img {
      height: 52px;
      width: auto;
      display: block;
      margin: 0 auto 10px;
    }
    .brand p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 34px 30px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .card .sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    .error {
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px; color: var(--error-tx);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      font-size: 11px; font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .field input {
      width: 100%;
      padding: 13px 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 11px;
      color: var(--text);
      font-size: 15px; font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--p1);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
    }
    .field input::placeholder { color: rgba(148,163,184,0.35); }

    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 44px; }
    .eye-btn {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text); }

    .btn {
      width: 100%; margin-top: 8px;
      padding: 13px;
      background: linear-gradient(135deg, var(--p1), var(--p2));
      border: none; border-radius: 11px;
      color: #fff; font-size: 15px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(139,92,246,0.3);
      transition: opacity 0.2s, transform 0.12s;
    }
    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.985); }

    .footer {
      text-align: center; font-size: 11px;
      color: var(--muted); margin-top: 20px; opacity: 0.45;
    }

    .forgot-link {
      display: block; text-align: right;
      font-size: 12px; color: var(--muted);
      text-decoration: none; margin-top: 8px;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--p1); }

    .wa-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      width: 54px; height: 54px; border-radius: 50%;
      background: #25D366;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: wa-pulse 2.5s ease-in-out infinite;
    }
    .wa-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(37,211,102,0.55);
      animation: none;
    }
    @keyframes wa-pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); }
      50%       { box-shadow: 0 4px 28px rgba(37,211,102,0.65); }
    }
  </style>
</head>
<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>

  <div class="wrapper">
    <div class="brand">
      <img src="/static/logo.png" alt="GCBS" />
      <p>Instagram Monitor</p>
    </div>

    <div class="card">
      <h2>Bem-vindo de volta</h2>
      <p class="sub">Entre com sua conta para acessar o painel</p>

      {% if error %}
      <div class="error">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#fca5a5" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label for="u">Usuário</label>
          <input id="u" type="text" name="username" placeholder="Digite seu usuário" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="p">Senha</label>
          <div class="input-wrap">
            <input id="p" type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="toggleSenha()" id="eye-btn" aria-label="Mostrar senha">
              <svg id="eye-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <a href="/forgot-password" class="forgot-link">Esqueci minha senha</a>
        <button type="submit" class="btn" style="margin-top:14px">Entrar</button>
      </form>
    </div>

    <p class="footer">© 2026 GCBS · Todos os direitos reservados</p>
  </div>
  <a class="wa-btn" href="https://wa.me/5531985982636?text=Ol%C3%A1%2C%20preciso%20de%20ajuda%20na%20plataforma%20Instagram%20Monitor." target="_blank" rel="noopener" aria-label="Suporte WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <script>
    function toggleSenha() {
      const input = document.getElementById('p');
      const icon  = document.getElementById('eye-icon');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      icon.innerHTML = showing
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }
  </script>
</body>
</html>
